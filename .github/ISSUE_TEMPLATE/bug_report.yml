name: Bug Report
description: Report a bug in Novyx Vault
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Cloud (vault.novyxlabs.com)
        - Desktop (Tauri)
        - Self-hosted
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "Chrome 120 / macOS 15"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or console errors
      description: If applicable, add screenshots or paste console errors.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help.
